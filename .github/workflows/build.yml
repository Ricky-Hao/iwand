name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            cc: gcc
            strip: strip
            apt_packages: musl-tools
            setup: ""
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            strip: aarch64-linux-gnu-strip
            apt_packages: gcc-aarch64-linux-gnu
            setup: ""
          - arch: armv7
            cc: arm-linux-gnueabihf-gcc
            strip: arm-linux-gnueabihf-strip
            apt_packages: gcc-arm-linux-gnueabihf
            setup: ""
          - arch: mipsel
            cc: mipsel-linux-gnu-gcc
            strip: mipsel-linux-gnu-strip
            apt_packages: gcc-mipsel-linux-gnu
            setup: ""
          - arch: mips
            cc: mips-linux-gnu-gcc
            strip: mips-linux-gnu-strip
            apt_packages: gcc-mips-linux-gnu
            setup: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.apt_packages }}

      - name: Build
        run: |
          ${{ matrix.setup }}
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            CC="musl-gcc" make static
          else
            CC="${{ matrix.cc }}" STRIP="${{ matrix.strip }}" \
            CFLAGS="-O2 -Wall -Wextra -Wno-unused-parameter" \
            LDFLAGS="-static" make all
            ${{ matrix.strip }} iwand
          fi
          file iwand

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iwand-${{ matrix.arch }}
          path: iwand

  freebsd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD amd64
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          run: |
            make clean
            make CC=cc CFLAGS="-O2 -Wall -Wextra -Wno-unused-parameter"
            ./iwand -v
            ./iwand -h
            strip iwand
            file iwand

      - name: Upload FreeBSD artifact
        uses: actions/upload-artifact@v4
        with:
          name: iwand-freebsd-amd64
          path: iwand

  release:
    needs: [build, freebsd]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release binaries
        run: |
          mkdir release
          for dir in artifacts/iwand-*; do
            arch=$(basename "$dir" | sed 's/iwand-//')
            cp "$dir/iwand" "release/iwand-${arch}"
          done
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
