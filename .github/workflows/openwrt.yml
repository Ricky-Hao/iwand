name: OpenWrt Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bin_arch: x86_64
            openwrt_archs: "x86_64"
          - bin_arch: aarch64
            openwrt_archs: "aarch64_cortex-a53 aarch64_cortex-a72 aarch64_cortex-a76 aarch64_generic"
          - bin_arch: armv7
            openwrt_archs: "arm_cortex-a5_vfpv4 arm_cortex-a7_neon-vfpv4 arm_cortex-a7_vfpv4 arm_cortex-a8_vfpv3 arm_cortex-a9_neon arm_cortex-a9_vfpv3-d16 arm_cortex-a15_neon-vfpv4"
          - bin_arch: mipsel
            openwrt_archs: "mipsel_24kc mipsel_74kc mipsel_mips32"
          - bin_arch: mips
            openwrt_archs: "mips_24kc mips_4kec mips_mips32"

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binary from build workflow
        uses: actions/download-artifact@v4
        with:
          name: iwand-${{ matrix.bin_arch }}
          path: dist
        continue-on-error: true

      - name: Build binary if artifact not available
        if: steps.download-binary.outcome == 'failure' || !hashFiles('dist/iwand')
        run: |
          sudo apt-get update -qq
          case "${{ matrix.bin_arch }}" in
            x86_64)   sudo apt-get install -y -qq musl-tools
                      CC=musl-gcc make static ;;
            aarch64)  sudo apt-get install -y -qq gcc-aarch64-linux-gnu
                      CC=aarch64-linux-gnu-gcc STRIP=aarch64-linux-gnu-strip CFLAGS="-O2 -Wall" LDFLAGS="-static" make all
                      aarch64-linux-gnu-strip iwand ;;
            armv7)    sudo apt-get install -y -qq gcc-arm-linux-gnueabihf
                      CC=arm-linux-gnueabihf-gcc STRIP=arm-linux-gnueabihf-strip CFLAGS="-O2 -Wall" LDFLAGS="-static" make all
                      arm-linux-gnueabihf-strip iwand ;;
            mipsel)   sudo apt-get install -y -qq gcc-mipsel-linux-gnu
                      CC=mipsel-linux-gnu-gcc STRIP=mipsel-linux-gnu-strip CFLAGS="-O2 -Wall" LDFLAGS="-static" make all
                      mipsel-linux-gnu-strip iwand ;;
            mips)     sudo apt-get install -y -qq gcc-mips-linux-gnu
                      CC=mips-linux-gnu-gcc STRIP=mips-linux-gnu-strip CFLAGS="-O2 -Wall" LDFLAGS="-static" make all
                      mips-linux-gnu-strip iwand ;;
          esac
          mkdir -p dist
          cp iwand dist/

      # --- IPK (OpenWrt <= 24.10) ---
      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Build base deb
        run: |
          chmod 755 dist/iwand
          chmod 755 openwrt/iwand.init
          chmod 755 luci-app-iwand/root/etc/init.d/iwand
          chmod 600 openwrt/iwan.conf.example
          fpm -t deb -s dir \
            --name iwand \
            --version "${{ steps.version.outputs.version }}" \
            --category net \
            --license MIT \
            --description "Panabit iWAN SD-WAN client daemon" \
            --url "https://github.com/Ricky-Hao/iwand" \
            --maintainer "Ricky-Hao <14084342+Ricky-Hao@users.noreply.github.com>" \
            --architecture all \
            --no-deb-generate-changes \
            --depends kmod-tun \
            --config-files /etc/sdwan/iwan.conf \
            -p dist/iwand.deb \
            dist/iwand=/usr/sbin/iwand \
            luci-app-iwand/root/etc/init.d/iwand=/etc/init.d/iwand \
            openwrt/iwan.conf.example=/etc/sdwan/iwan.conf \
            luci-app-iwand/root/etc/config/iwand=/etc/config/iwand \
            luci-app-iwand/htdocs/luci-static/resources/view/iwand.js=/www/luci-static/resources/view/iwand.js \
            luci-app-iwand/root/usr/share/luci/menu.d/luci-app-iwand.json=/usr/share/luci/menu.d/luci-app-iwand.json \
            luci-app-iwand/root/usr/share/rpcd/acl.d/luci-app-iwand.json=/usr/share/rpcd/acl.d/luci-app-iwand.json

      - name: Convert to OpenWrt ipk
        run: |
          mkdir -p output/ipk
          for arch in ${{ matrix.openwrt_archs }}; do
            .github/scripts/deb2ipk.sh "$arch" dist/iwand.deb "output/ipk/iwand_${{ steps.version.outputs.version }}_${arch}.ipk"
          done
          ls -lh output/ipk/

      # --- APK (OpenWrt >= 25.12) ---
      - name: Install apk-tools
        run: |
          docker run --rm -v /usr/local/bin:/mnt alpine:edge \
            sh -c "apk add --no-cache apk-tools-static && cp /sbin/apk.static /mnt/apk && chmod +x /mnt/apk"

      - name: Build OpenWrt APK packages
        run: |
          mkdir -p output/apk
          chmod 755 dist/iwand
          for arch in ${{ matrix.openwrt_archs }}; do
            .github/scripts/build_openwrt_apk.sh \
              "$arch" \
              "${{ steps.version.outputs.version }}" \
              dist/iwand \
              "output/apk/iwand_${{ steps.version.outputs.version }}_${arch}.apk"
          done
          ls -lh output/apk/

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.bin_arch }}
          path: output/ipk/*.ipk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.bin_arch }}
          path: output/apk/*.apk

  release:
    needs: build-packages
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect packages
        run: |
          mkdir release
          find artifacts -name '*.ipk' -exec cp {} release/ \;
          find artifacts -name '*.apk' -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
